<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Генератор иконок</title>
    <style>
        body { font-family: sans-serif; padding: 20px; text-align: center; }
        canvas { border: 1px solid #ccc; margin: 10px; }
    </style>
</head>
<body>
    <h1>Генератор иконок для ЖК Домовой</h1>
    <canvas id="c192" width="192" height="192"></canvas>
    <canvas id="c512" width="512" height="512"></canvas>
    <br><br>
    <button onclick="downloadIcons()">Скачать иконки</button>
    <script>
        function drawIcon(canvas, size) {
            const ctx = canvas.getContext('2d');
            // Фон
            ctx.fillStyle = '#2E7D32';
            ctx.fillRect(0, 0, size, size);
            // Дом
            ctx.fillStyle = '#fff';
            const padding = size * 0.2;
            const w = size - padding * 2;
            const h = size * 0.5;
            const x = padding;
            const y = size - padding - h;
            // Крыша
            ctx.beginPath();
            ctx.moveTo(size/2, padding);
            ctx.lineTo(size - padding, size/2);
            ctx.lineTo(padding, size/2);
            ctx.closePath();
            ctx.fill();
            // Дом
            ctx.fillRect(x, size/2, w, h/2);
            // Окно
            ctx.fillStyle = '#2E7D32';
            ctx.fillRect(size/2 - w/4, size/2 + h/4, w/2, h/4);
        }
        drawIcon(document.getElementById('c192'), 192);
        drawIcon(document.getElementById('c512'), 512);
        function downloadIcons() {
            ['c192', 'c512'].forEach(id => {
                const a = document.createElement('a');
                a.download = id.replace('c', 'icon-') + '.png';
                a.href = document.getElementById(id).toDataURL();
                a.click();
            });
        }
    </script>
</body>
</html>
